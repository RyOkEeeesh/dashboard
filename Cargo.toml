[package]
name = "dashboard"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = "0.18.1"
sea-orm = { version = "1.1.0", features = [ "sqlx-sqlite", "runtime-tokio-rustls", "macros" ] }
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
bme280-rs = "0.3"

[target.'cfg(target_os = "linux")'.dependencies]
linux-embedded-hal = "0.4"